<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120">
  <rect fill="#0d1117" width="800" height="120"/>

  <!-- connection lines -->
  <g stroke="#1e2430" stroke-width="1" fill="none">
    <!-- layer 0 to layer 1 -->
    <line x1="100" y1="30" x2="250" y2="20"/>
    <line x1="100" y1="30" x2="250" y2="50"/>
    <line x1="100" y1="30" x2="250" y2="80"/>
    <line x1="100" y1="60" x2="250" y2="20"/>
    <line x1="100" y1="60" x2="250" y2="50"/>
    <line x1="100" y1="60" x2="250" y2="80"/>
    <line x1="100" y1="90" x2="250" y2="20"/>
    <line x1="100" y1="90" x2="250" y2="50"/>
    <line x1="100" y1="90" x2="250" y2="80"/>
    <!-- layer 1 to layer 2 -->
    <line x1="250" y1="20" x2="400" y2="35"/>
    <line x1="250" y1="20" x2="400" y2="65"/>
    <line x1="250" y1="20" x2="400" y2="95"/>
    <line x1="250" y1="50" x2="400" y2="35"/>
    <line x1="250" y1="50" x2="400" y2="65"/>
    <line x1="250" y1="50" x2="400" y2="95"/>
    <line x1="250" y1="80" x2="400" y2="35"/>
    <line x1="250" y1="80" x2="400" y2="65"/>
    <line x1="250" y1="80" x2="400" y2="95"/>
    <!-- layer 2 to layer 3 -->
    <line x1="400" y1="35" x2="550" y2="25"/>
    <line x1="400" y1="35" x2="550" y2="60"/>
    <line x1="400" y1="35" x2="550" y2="95"/>
    <line x1="400" y1="65" x2="550" y2="25"/>
    <line x1="400" y1="65" x2="550" y2="60"/>
    <line x1="400" y1="65" x2="550" y2="95"/>
    <line x1="400" y1="95" x2="550" y2="25"/>
    <line x1="400" y1="95" x2="550" y2="60"/>
    <line x1="400" y1="95" x2="550" y2="95"/>
    <!-- layer 3 to output -->
    <line x1="550" y1="25" x2="700" y2="45"/>
    <line x1="550" y1="25" x2="700" y2="75"/>
    <line x1="550" y1="60" x2="700" y2="45"/>
    <line x1="550" y1="60" x2="700" y2="75"/>
    <line x1="550" y1="95" x2="700" y2="45"/>
    <line x1="550" y1="95" x2="700" y2="75"/>
  </g>

  <!-- traveling pulses along connections -->
  <!-- L0→L1 pulses -->
  <circle r="2" fill="#00e5ff" opacity="0">
    <animate attributeName="cx" values="100;250" dur="1.5s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="30;50" dur="1.5s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="1.5s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#b388ff" opacity="0">
    <animate attributeName="cx" values="100;250" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="60;20" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#69f0ae" opacity="0">
    <animate attributeName="cx" values="100;250" dur="1.4s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="90;80" dur="1.4s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.85;0.85;0" dur="1.4s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#ff4081" opacity="0">
    <animate attributeName="cx" values="100;250" dur="1.6s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="30;80" dur="1.6s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" dur="1.6s" begin="0.3s" repeatCount="indefinite"/>
  </circle>

  <!-- L1→L2 pulses -->
  <circle r="2" fill="#ffab40" opacity="0">
    <animate attributeName="cx" values="250;400" dur="1.5s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="20;65" dur="1.5s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="1.5s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#00e5ff" opacity="0">
    <animate attributeName="cx" values="250;400" dur="1.7s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="50;35" dur="1.7s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="1.7s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#b388ff" opacity="0">
    <animate attributeName="cx" values="250;400" dur="1.3s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;95" dur="1.3s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.85;0.85;0" dur="1.3s" begin="0.4s" repeatCount="indefinite"/>
  </circle>

  <!-- L2→L3 pulses -->
  <circle r="2" fill="#69f0ae" opacity="0">
    <animate attributeName="cx" values="400;550" dur="1.6s" begin="1.0s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="35;60" dur="1.6s" begin="1.0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="1.6s" begin="1.0s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#ff4081" opacity="0">
    <animate attributeName="cx" values="400;550" dur="1.4s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="65;25" dur="1.4s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="1.4s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#ffff00" opacity="0">
    <animate attributeName="cx" values="400;550" dur="1.8s" begin="1.3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="95;95" dur="1.8s" begin="1.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" dur="1.8s" begin="1.3s" repeatCount="indefinite"/>
  </circle>

  <!-- L3→output pulses -->
  <circle r="2" fill="#00e5ff" opacity="0">
    <animate attributeName="cx" values="550;700" dur="1.5s" begin="1.6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="25;45" dur="1.5s" begin="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="1.5s" begin="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#b388ff" opacity="0">
    <animate attributeName="cx" values="550;700" dur="1.3s" begin="0.7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="60;75" dur="1.3s" begin="0.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.85;0.85;0" dur="1.3s" begin="0.7s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#69f0ae" opacity="0">
    <animate attributeName="cx" values="550;700" dur="1.7s" begin="1.9s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="95;75" dur="1.7s" begin="1.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="1.7s" begin="1.9s" repeatCount="indefinite"/>
  </circle>

  <!-- Neuron nodes layer 0 (input) -->
  <circle cx="100" cy="30" r="5" fill="#0d1117" stroke="#00e5ff" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="60" r="5" fill="#0d1117" stroke="#69f0ae" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.3s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="90" r="5" fill="#0d1117" stroke="#b388ff" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.8s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- layer 1 -->
  <circle cx="250" cy="20" r="5" fill="#0d1117" stroke="#ff4081" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.1s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="50" r="5" fill="#0d1117" stroke="#ffab40" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.9s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="80" r="5" fill="#0d1117" stroke="#00e5ff" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.4s" begin="1.0s" repeatCount="indefinite"/>
  </circle>

  <!-- layer 2 -->
  <circle cx="400" cy="35" r="5" fill="#0d1117" stroke="#69f0ae" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="65" r="5" fill="#0d1117" stroke="#b388ff" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.7s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="95" r="5" fill="#0d1117" stroke="#ffff00" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
  </circle>

  <!-- layer 3 -->
  <circle cx="550" cy="25" r="5" fill="#0d1117" stroke="#00e5ff" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" begin="0.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="60" r="5" fill="#0d1117" stroke="#ff4081" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.8s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="95" r="5" fill="#0d1117" stroke="#69f0ae" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.3s" begin="0.1s" repeatCount="indefinite"/>
  </circle>

  <!-- output layer -->
  <circle cx="700" cy="45" r="6" fill="#0d1117" stroke="#b388ff" stroke-width="2" opacity="0.8">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="6;7;6" dur="2s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="75" r="6" fill="#0d1117" stroke="#ffab40" stroke-width="2" opacity="0.8">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="6;7;6" dur="2.2s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- labels -->
  <text fill="#30363d" font-family="-apple-system,Segoe UI,sans-serif" font-size="9" x="100" y="112" text-anchor="middle">input</text>
  <text fill="#30363d" font-family="-apple-system,Segoe UI,sans-serif" font-size="9" x="400" y="112" text-anchor="middle">hidden layers</text>
  <text fill="#30363d" font-family="-apple-system,Segoe UI,sans-serif" font-size="9" x="700" y="112" text-anchor="middle">output</text>
</svg>