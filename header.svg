<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <rect fill="#0d1117" width="800" height="200"/>

  <!-- grid lines left -->
  <g opacity="0.3" stroke="#161b22" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="200"/><line x1="20" y1="0" x2="20" y2="200"/>
    <line x1="40" y1="0" x2="40" y2="200"/><line x1="60" y1="0" x2="60" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="200"/><line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="0" y1="20" x2="100" y2="20"/><line x1="0" y1="40" x2="100" y2="40"/>
    <line x1="0" y1="60" x2="100" y2="60"/><line x1="0" y1="80" x2="100" y2="80"/>
    <line x1="0" y1="100" x2="100" y2="100"/><line x1="0" y1="120" x2="100" y2="120"/>
    <line x1="0" y1="140" x2="100" y2="140"/><line x1="0" y1="160" x2="100" y2="160"/>
    <line x1="0" y1="180" x2="100" y2="180"/>
  </g>
  <!-- grid lines right -->
  <g opacity="0.3" stroke="#161b22" stroke-width="0.5">
    <line x1="700" y1="0" x2="700" y2="200"/><line x1="720" y1="0" x2="720" y2="200"/>
    <line x1="740" y1="0" x2="740" y2="200"/><line x1="760" y1="0" x2="760" y2="200"/>
    <line x1="780" y1="0" x2="780" y2="200"/><line x1="800" y1="0" x2="800" y2="200"/>
    <line x1="700" y1="20" x2="800" y2="20"/><line x1="700" y1="40" x2="800" y2="40"/>
    <line x1="700" y1="60" x2="800" y2="60"/><line x1="700" y1="80" x2="800" y2="80"/>
    <line x1="700" y1="100" x2="800" y2="100"/><line x1="700" y1="120" x2="800" y2="120"/>
    <line x1="700" y1="140" x2="800" y2="140"/><line x1="700" y1="160" x2="800" y2="160"/>
    <line x1="700" y1="180" x2="800" y2="180"/>
  </g>

  <!-- falling blocks left side -->
  <rect fill="#00e5ff" x="20" y="-20" width="18" height="18" rx="2" opacity="0">
    <animate attributeName="y" values="-20;200" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect fill="#b388ff" x="60" y="-40" width="18" height="18" rx="2" opacity="0">
    <animate attributeName="y" values="-40;210" dur="5s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" dur="5s" begin="0.8s" repeatCount="indefinite"/>
  </rect>
  <rect fill="#ff4081" x="0" y="-30" width="18" height="18" rx="2" opacity="0">
    <animate attributeName="y" values="-30;220" dur="3.5s" begin="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3.5s" begin="1.6s" repeatCount="indefinite"/>
  </rect>
  <rect fill="#69f0ae" x="40" y="-50" width="18" height="18" rx="2" opacity="0">
    <animate attributeName="y" values="-50;190" dur="4.5s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="4.5s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <rect fill="#ffab40" x="80" y="-20" width="18" height="18" rx="2" opacity="0">
    <animate attributeName="y" values="-20;200" dur="3.8s" begin="2.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" dur="3.8s" begin="2.1s" repeatCount="indefinite"/>
  </rect>
  <rect fill="#00e5ff" x="40" y="-60" width="18" height="18" rx="2" opacity="0">
    <animate attributeName="y" values="-60;210" dur="5.2s" begin="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" dur="5.2s" begin="2.8s" repeatCount="indefinite"/>
  </rect>

  <!-- falling blocks right side -->
  <rect fill="#ffff00" x="720" y="-60" width="18" height="18" rx="2" opacity="0">
    <animate attributeName="y" values="-60;210" dur="4.2s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" dur="4.2s" begin="1.2s" repeatCount="indefinite"/>
  </rect>
  <rect fill="#448aff" x="740" y="-30" width="18" height="18" rx="2" opacity="0">
    <animate attributeName="y" values="-30;220" dur="5.2s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="5.2s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
  <rect fill="#ff4081" x="700" y="-50" width="18" height="18" rx="2" opacity="0">
    <animate attributeName="y" values="-50;190" dur="3.6s" begin="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3.6s" begin="1.8s" repeatCount="indefinite"/>
  </rect>
  <rect fill="#69f0ae" x="760" y="-20" width="18" height="18" rx="2" opacity="0">
    <animate attributeName="y" values="-20;200" dur="4.8s" begin="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" dur="4.8s" begin="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect fill="#b388ff" x="780" y="-40" width="18" height="18" rx="2" opacity="0">
    <animate attributeName="y" values="-40;210" dur="4.6s" begin="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" dur="4.6s" begin="1.4s" repeatCount="indefinite"/>
  </rect>
  <rect fill="#00e5ff" x="720" y="-30" width="18" height="18" rx="2" opacity="0">
    <animate attributeName="y" values="-30;200" dur="3.2s" begin="0.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="3.2s" begin="0.9s" repeatCount="indefinite"/>
  </rect>

  <!-- stacked blocks left -->
  <rect fill="#00e5ff" x="0" y="180" width="18" height="18" rx="2" opacity="0.45"/>
  <rect fill="#b388ff" x="20" y="180" width="18" height="18" rx="2" opacity="0.55"/>
  <rect fill="#ff4081" x="40" y="180" width="18" height="18" rx="2" opacity="0.35"/>
  <rect fill="#69f0ae" x="60" y="180" width="18" height="18" rx="2" opacity="0.6"/>
  <rect fill="#ffab40" x="80" y="180" width="18" height="18" rx="2" opacity="0.45"/>
  <rect fill="#ffff00" x="20" y="160" width="18" height="18" rx="2" opacity="0.35"/>
  <rect fill="#448aff" x="40" y="160" width="18" height="18" rx="2" opacity="0.4"/>
  <rect fill="#00e5ff" x="60" y="160" width="18" height="18" rx="2" opacity="0.25"/>
  <rect fill="#ff4081" x="0" y="160" width="18" height="18" rx="2" opacity="0.35"/>
  <rect fill="#69f0ae" x="40" y="140" width="18" height="18" rx="2" opacity="0.25"/>

  <!-- stacked blocks right -->
  <rect fill="#448aff" x="700" y="180" width="18" height="18" rx="2" opacity="0.5"/>
  <rect fill="#ffff00" x="720" y="180" width="18" height="18" rx="2" opacity="0.45"/>
  <rect fill="#69f0ae" x="740" y="180" width="18" height="18" rx="2" opacity="0.6"/>
  <rect fill="#b388ff" x="760" y="180" width="18" height="18" rx="2" opacity="0.35"/>
  <rect fill="#00e5ff" x="780" y="180" width="18" height="18" rx="2" opacity="0.45"/>
  <rect fill="#ffab40" x="720" y="160" width="18" height="18" rx="2" opacity="0.35"/>
  <rect fill="#ff4081" x="740" y="160" width="18" height="18" rx="2" opacity="0.4"/>
  <rect fill="#448aff" x="760" y="160" width="18" height="18" rx="2" opacity="0.25"/>
  <rect fill="#ffff00" x="700" y="160" width="18" height="18" rx="2" opacity="0.35"/>
  <rect fill="#69f0ae" x="740" y="140" width="18" height="18" rx="2" opacity="0.25"/>

  <!-- center text -->
  <text fill="#e6edf3" font-family="-apple-system,Segoe UI,sans-serif" font-size="28" font-weight="700" x="400" y="80" text-anchor="middle">
    Night
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
  </text>
  <text fill="#8b949e" font-family="-apple-system,Segoe UI,sans-serif" font-size="13" x="400" y="110" text-anchor="middle">
    building things with AI
    <animate attributeName="opacity" values="0;0.6" dur="1s" fill="freeze"/>
  </text>
  <!-- blinking cursor -->
  <rect fill="#69f0ae" x="478" y="99" width="7" height="13">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  <text fill="#8b949e" font-family="-apple-system,Segoe UI,sans-serif" font-size="12" x="400" y="138" text-anchor="middle">
    prompt engineering · web · mobile
    <animate attributeName="opacity" values="0;0.5" dur="1s" begin="0.5s" fill="freeze"/>
  </text>
  <text fill="#8b949e" font-family="-apple-system,Segoe UI,sans-serif" font-size="12" x="400" y="162" text-anchor="middle">
    ♿ accessibility matters
    <animate attributeName="opacity" values="0;0.5" dur="1s" begin="1s" fill="freeze"/>
  </text>
</svg>