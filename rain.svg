  <!-- trailing streaks (longer particles) -->
  <rect fill="#00e5ff" width="1" height="8" rx="0.5" opacity="0">
    <animate attributeName="x" values="62;62" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y" values="-10;105" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <rect fill="#b388ff" width="1" height="10" rx="0.5" opacity="0">
    <animate attributeName="x" values="225;225" dur="3s" repeatCount="indefinite"/>
