    <animate attributeName="cy" values="-4;105" dur="2.6s" begin="2.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" dur="2.6s" begin="2.1s" repeatCount="indefinite"/>
