    <animate attributeName="cy" values="-5;105" dur="2.8s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" dur="2.8s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle fill="#00e5ff" r="0.6" opacity="0">
