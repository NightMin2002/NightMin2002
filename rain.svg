    <animate attributeName="cy" values="-12;105" dur="4s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.35;0.35;0" dur="4s" begin="0.3s" repeatCount="indefinite"/>
